version: 3

meta:
  program: xtgeoip
  summary: Build and manage xt_geoip data from MaxMind GeoLite2 CSVs.

proof:
  unique_maps_to: true
  full_branch_coverage: true

flags:
  b:
    long: backup
    kind: bool
    summary: Back up current database before replacing it.
  c:
    long: clean
    kind: bool
    summary: Clean working files before continuing.
  p:
    long: prune
    kind: bool
    summary: Prune retained artifacts for the current operation.
  f:
    long: force
    kind: bool
    summary: Force the relevant operation when supported.
  l:
    long: legacy
    kind: bool
    summary: Enable legacy mode.

reason_templates:
  ok:
    text: "{outcome}"
  invalid_flag:
    text: "unsupported option, -{flag} is not valid for {command}"
  invalid_combo:
    text: "unsupported option combination"
  no_prune_here:
    text: "unsupported option, {command} has no prune function"
  no_force_here:
    text: "unsupported option, {target} does not support force"
  ambiguous_force_prune:
    text: "unsupported option, ambiguous and prune does not support force"
  ambiguous_prune_target:
    text: "unsupported option, ambiguous (does prune apply to {left} or {right}?)"
  missing_required_argument:
    text: "missing required argument, {command} requires {argument}"
  no_command:
    text: "no command or top-level action specified"

# Canonical Rust error branches
error_cases:
  no_command:
    maps_to: "normalize_cli_to_action -> Ok(None)"
  legacy_top_level:
    maps_to: "if cli.legacy && cli.command.is_none()"
  top_level_invalid_combo:
    maps_to: "if p && !b && !c OR fallback Err"
  top_level_force_without_target:
    maps_to: "if f && !(b || c)"
  top_level_clean_prune:
    maps_to: "if c && p"
  top_level_backup_prune_force:
    maps_to: "if b && p && f"

  fetch_invalid_flags:
    maps_to: "Fetch invalid_flags block"

  build_prune_without_backup:
    maps_to: "if *prune && !*backup"
  build_ambiguous_all_flags:
    maps_to: "if *prune && *force && *backup && *clean"

  run_ambiguous_cpf:
    maps_to: "if *prune && *force && *clean"
  run_ambiguous_bcp:
    maps_to: "if *backup && *clean && *prune"

  conf_missing_flag:
    maps_to: "clap ArgGroup(required=true)"

top_level:
  kind: FlagCommand
  summary: "Top level xtgeoip command"
  allowed_flags: [b, c, p, f]

  examples:
    - case_id: TL-001
      cmd: "xtgeoip"
      valid: true
      exit_status: 1
      maps_to: no_command

    - case_id: TL-002
      cmd: "xtgeoip -h"
      valid: true

    - case_id: TL-003
      cmd: "xtgeoip -b"
      valid: true

    - case_id: TL-004
      cmd: "xtgeoip -b -c"
      valid: true

    - case_id: TL-005
      cmd: "xtgeoip -b -c -f"
      valid: true

    - case_id: TL-006
      cmd: "xtgeoip -b -f"
      valid: true

    - case_id: TL-007
      cmd: "xtgeoip -b -p"
      valid: true

    - case_id: TL-008
      cmd: "xtgeoip -b -p -f"
      valid: false
      reason:
        code: ambiguous_force_prune
      maps_to: top_level_backup_prune_force

    - case_id: TL-009
      cmd: "xtgeoip -c"
      valid: true

    - case_id: TL-010
      cmd: "xtgeoip -c -f"
      valid: true

    - case_id: TL-011
      cmd: "xtgeoip -c -p"
      valid: false
      reason:
        code: no_prune_here
      maps_to: top_level_clean_prune

    - case_id: TL-012
      cmd: "xtgeoip -c -p -f"
      valid: false
      reason:
        code: invalid_combo
      maps_to: top_level_invalid_combo

    - case_id: TL-013
      cmd: "xtgeoip -p"
      valid: false
      reason:
        code: invalid_combo
      maps_to: top_level_invalid_combo

    - case_id: TL-014
      cmd: "xtgeoip -f"
      valid: false
      reason:
        code: no_force_here
      maps_to: top_level_force_without_target

    - case_id: TL-015
      cmd: "xtgeoip -l"
      valid: false
      reason:
        code: invalid_flag
      maps_to: legacy_top_level

commands:
  fetch:
    kind: FlagCommand
    allowed_flags: [p]

    examples:
      - case_id: F-001
        cmd: "xtgeoip fetch"
        valid: true

      - case_id: F-002
        cmd: "xtgeoip fetch -p"
        valid: true

      - case_id: F-003
        cmd: "xtgeoip fetch -l"
        valid: false
        reason:
          code: invalid_flag
        maps_to: fetch_invalid_flags

      - case_id: F-004
        cmd: "xtgeoip fetch -b"
        valid: false
        reason:
          code: invalid_flag
        maps_to: fetch_invalid_flags

      - case_id: F-005
        cmd: "xtgeoip fetch -c"
        valid: false
        reason:
          code: invalid_flag
        maps_to: fetch_invalid_flags

      - case_id: F-006
        cmd: "xtgeoip fetch -f"
        valid: false
        reason:
          code: invalid_flag
        maps_to: fetch_invalid_flags

  build:
    kind: FlagCommand

    examples:
      - case_id: B-001
        cmd: "xtgeoip build"
        valid: true

      - case_id: B-002
        cmd: "xtgeoip build -l"
        valid: true

      - case_id: B-003
        cmd: "xtgeoip build -b -p"
        valid: true

      - case_id: B-004
        cmd: "xtgeoip build -p"
        valid: false
        reason:
          code: no_prune_here
        maps_to: build_prune_without_backup

      - case_id: B-005
        cmd: "xtgeoip build -c -f"
        valid: true

      - case_id: B-006
        cmd: "xtgeoip build -b -c -p"
        valid: true

      - case_id: B-007
        cmd: "xtgeoip build -b -c -p -f"
        valid: false
        reason:
          code: ambiguous_force_prune
        maps_to: build_ambiguous_all_flags

  run:
    kind: FlagCommand

    examples:
      - case_id: R-001
        cmd: "xtgeoip run"
        valid: true

      - case_id: R-002
        cmd: "xtgeoip run -l"
        valid: true

      - case_id: R-003
        cmd: "xtgeoip run -p"
        valid: true

      - case_id: R-004
        cmd: "xtgeoip run -c -p"
        valid: true

      - case_id: R-005
        cmd: "xtgeoip run -c -f"
        valid: true

      - case_id: R-006
        cmd: "xtgeoip run -c -p -f"
        valid: false
        reason:
          code: ambiguous_force_prune
        maps_to: run_ambiguous_cpf

      - case_id: R-007
        cmd: "xtgeoip run -b -c -p"
        valid: false
        reason:
          code: ambiguous_prune_target
        maps_to: run_ambiguous_bcp

  conf:
    kind: SelectorCommand

    examples:
      - case_id: C-001
        cmd: "xtgeoip conf"
        valid: false
        reason:
          code: missing_required_argument
        maps_to: conf_missing_flag

      - case_id: C-002
        cmd: "xtgeoip conf -s"
        valid: true

      - case_id: C-003
        cmd: "xtgeoip conf -d"
        valid: true

      - case_id: C-004
        cmd: "xtgeoip conf -e"
        valid: true
