version: 2

meta:
  program: xtgeoip
  summary: Build and manage xt_geoip data from MaxMind GeoLite2 CSVs.

flags:
  b:
    long: backup
    kind: bool
    summary: Back up current database before replacing it.
  c:
    long: clean
    kind: bool
    summary: Clean working files before continuing.
  p:
    long: prune
    kind: bool
    summary: Prune retained artifacts for the current operation.
  f:
    long: force
    kind: bool
    summary: Force the relevant operation when supported.
  l:
    long: legacy
    kind: bool
    summary: Enable legacy mode.

reason_templates:
  ok:
    text: "{outcome}"
  invalid_flag:
    text: "unsupported option, -{flag} is not valid for {command}"
  invalid_combo:
    text: "unsupported option combination"
  no_prune_here:
    text: "unsupported option, {command} has no prune function"
  no_force_here:
    text: "unsupported option, {target} does not support force"
  ambiguous_force_prune:
    text: "unsupported option, ambiguous and prune does not support force"
  ambiguous_prune_target:
    text: "unsupported option, ambiguous (does prune apply to {left} or {right}?)"
  missing_required_argument:
    text: "missing required argument, {command} requires {argument}"

commands:
  fetch:
    kind: flag_command
    summary: Download or refresh the local MaxMind CSV archive set.
    allowed_flags: [p]
    examples:
      - cmd: "xtgeoip fetch"
        outcome: "fetch CSVs"
        valid: true
      - cmd: "xtgeoip fetch -p"
        outcome: "fetch CSVs, then prune CSVs"
        valid: true
      - cmd: "xtgeoip fetch -l"
        valid: false
        reason:
          code: invalid_flag
          args: { flag: "l", command: "fetch" }
      - cmd: "xtgeoip fetch -b"
        valid: false
        reason:
          code: invalid_flag
          args: { flag: "b", command: "fetch" }

  build:
    kind: flag_command
    summary: Build xt_geoip data from the local CSV copy.
    allowed_flags: [b, c, p, f, l]
    examples:
      - cmd: "xtgeoip build"
        outcome: "build using local copy of database"
        valid: true
      - cmd: "xtgeoip build -l"
        outcome: "build using local copy of database in legacy mode"
        valid: true
      - cmd: "xtgeoip build -b -p"
        outcome: "backup, prune backups, then build"
        valid: true
      - cmd: "xtgeoip build -p"
        valid: false
        reason:
          code: no_prune_here
          args: { command: "build" }
      - cmd: "xtgeoip build -c -f"
        outcome: "clean using manifest, then build using local copy of database"
        valid: true
      - cmd: "xtgeoip build -b -c -p"
        outcome: "backup, prune backups, clean, then build"
        valid: true
      - cmd: "xtgeoip build -b -c -p -f"
        valid: false
        reason:
          code: ambiguous_force_prune

  run:
    kind: flag_command
    summary: Fetch, then build, optionally wrapping with backup/clean/prune.
    allowed_flags: [b, c, p, f, l]
    examples:
      - cmd: "xtgeoip run"
        outcome: "fetch, then build"
        valid: true
      - cmd: "xtgeoip run -l"
        outcome: "fetch, then build in legacy mode"
        valid: true
      - cmd: "xtgeoip run -p"
        outcome: "fetch, then prune CSVs, then build"
        valid: true
      - cmd: "xtgeoip run -c -p"
        outcome: "clean using manifest, then fetch, then prune CSVs, then build"
        valid: true
      - cmd: "xtgeoip run -c -f"
        outcome: "force clean without manifest, then fetch, then build"
        valid: true
      - cmd: "xtgeoip run -c -p -f"
        valid: false
        reason:
          code: ambiguous_force_prune
      - cmd: "xtgeoip run -b -c -p"
        valid: false
        reason:
          code: ambiguous_prune_target
          args: { left: "fetch", right: "backup" }

  conf:
    kind: selector_command
    summary: Configuration operations.
    usage: "xtgeoip conf <FLAG>"
    positional:
      name: FLAG
      required: true
      choices:
        d:
          summary: Show default configuration.
        s:
          summary: Show current configuration.
        e:
          summary: Edit configuration.
    constraints:
      exactly_one_positional: true
    examples:
      - cmd: "xtgeoip conf"
        valid: false
        reason:
          code: missing_required_argument
          args: { argument: "FLAG", command: "conf" }
      - cmd: "xtgeoip conf -s"
        outcome: "show current config"
        valid: true
      - cmd: "xtgeoip conf -d"
        outcome: "show default config"
        valid: true
      - cmd: "xtgeoip conf -e"
        outcome: "edit config"
        valid: true
