version: 3.1

meta:
  program: xtgeoip
  summary: Build and manage xt_geoip data from MaxMind GeoLite2 CSVs.

proof:
  unique_maps_to: true
  full_branch_coverage: true

flags:
  b:
    long: backup
    kind: bool
    summary: Back up current database before replacing it.
  c:
    long: clean
    kind: bool
    summary: Clean working files before continuing.
  p:
    long: prune
    kind: bool
    summary: Prune retained artifacts for the current operation.
  f:
    long: force
    kind: bool
    summary: Force the relevant operation when supported.
  l:
    long: legacy
    kind: bool
    summary: Enable legacy mode.

reason_templates:
  no_argument:
    text: "you must specify at least one argument"
  no_legacy_here:
    text: "you must specify build or run, for the --legacy option"
  no_force_alone:
    text: "you must specify --backup or --clean, for the --force option"
  no_prune_alone:
    text: "you must specify fetch or --backup, for the --prune option"
  no_prune_clean:
    text: "you must specify fetch or --backup, for the prune option, and --clean does not support the --prune option"
  no_prune_clean_force:
    text: "you must specify fetch or --backup, for the prune option, --clean does not support the --prune option, and --prune does not support the --force option"
  no_prune_force:
    text: "--prune does not support the --force option"
  no_fetch_legacy:
    text: "fetch does not support the --legacy option"
  no_fetch_backup:
    text: "fetch does not support the --backup option"
  no_fetch_clean:
    text: "fetch does not support the --clean option"
  no_fetch_force:
    text: "fetch does not support the --force option"
  no_build_force:
    text: "build does not support the --force option"
  no_prune_backup:
    text: "you must specify --backup, for the --prune option"
  no_run_force:
    text: "run does not support the --force option"
  prune_target_ambiguous:
    text: "you must specify fetch or build separately, for the --prune option"
  missing_required_argument:
    text: "{command} requires {argument}"

error_cases:
  top_level_no_args: { maps_to: top_level_no_args }
  top_level_legacy: { maps_to: top_level_legacy }
  top_level_force_no_target: { maps_to: top_level_force_no_target }
  top_level_prune_no_target: { maps_to: top_level_prune_no_target }
  top_level_prune_with_clean: { maps_to: top_level_prune_with_clean }
  top_level_prune_clean_force: { maps_to: top_level_prune_clean_force }
  top_level_prune_force: { maps_to: top_level_prune_force }
  fetch_no_legacy: { maps_to: fetch_no_legacy }
  fetch_no_backup: { maps_to: fetch_no_backup }
  fetch_no_clean: { maps_to: fetch_no_clean }
  fetch_no_force: { maps_to: fetch_no_force }
  build_force_no_target: { maps_to: build_force_no_target }
  build_prune_no_backup: { maps_to: build_prune_no_backup }
  build_prune_force: { maps_to: build_prune_force }
  run_force_no_target: { maps_to: run_force_no_target }
  run_prune_force: { maps_to: run_prune_force }
  run_prune_ambiguous: { maps_to: run_prune_ambiguous }
  conf_missing_flag: { maps_to: conf_missing_flag }

top_level:
  kind: FlagCommand
  summary: Top level xtgeoip command
  allowed_flags: [b, c, p, f]
  examples:
    - case_id: TL-001
      cmd: "xtgeoip"
      valid: false
      reason: { code: no_argument }
      maps_to: top_level_no_args
      exit_status: 1
    - case_id: TL-002
      cmd: "xtgeoip -h"
      valid: true
      outcome: "display usage"
    - case_id: TL-003
      cmd: "xtgeoip -l"
      valid: false
      reason: { code: no_legacy_here }
      maps_to: top_level_legacy
    - case_id: TL-004
      cmd: "xtgeoip -f"
      valid: false
      reason: { code: no_force_alone }
      maps_to: top_level_force_no_target
    - case_id: TL-005
      cmd: "xtgeoip -p"
      valid: false
      reason: { code: no_prune_alone }
      maps_to: top_level_prune_no_target
    - case_id: TL-006
      cmd: "xtgeoip -b"
      valid: true
      outcome: "backup database"
    - case_id: TL-007
      cmd: "xtgeoip -c"
      valid: true
      outcome: "clean database"
    - case_id: TL-008
      cmd: "xtgeoip -b -c"
      valid: true
      outcome: "backup then clean"
    - case_id: TL-009
      cmd: "xtgeoip -b -p"
      valid: true
      outcome: "backup then prune"
    - case_id: TL-010
      cmd: "xtgeoip -c -p"
      valid: false
      reason: { code: no_prune_clean }
      maps_to: top_level_prune_with_clean
    - case_id: TL-011
      cmd: "xtgeoip -b -p -f"
      valid: false
      reason: { code: no_prune_force }
      maps_to: top_level_prune_force
    - case_id: TL-012
      cmd: "xtgeoip -c -p -f"
      valid: false
      reason: { code: no_prune_clean_force }
      maps_to: top_level_prune_clean_force
    - case_id: TL-013
      cmd: "xtgeoip -b -f"
      valid: true
      outcome: "force backup database"
    - case_id: TL-014
      cmd: "xtgeoip -b -c -f"
      valid: true
      outcome: "force backup then clean"

commands:

  fetch:
    kind: FlagCommand
    summary: Fetch GeoLite2 data files
    allowed_flags: [p]
    examples:
      - case_id: F-001
        cmd: "xtgeoip fetch"
        valid: true
        outcome: "fetch CSVs"
      - case_id: F-002
        cmd: "xtgeoip fetch -p"
        valid: true
        outcome: "fetch then prune archives"
      - case_id: F-003
        cmd: "xtgeoip fetch -l"
        valid: false
        reason: { code: no_fetch_legacy }
        maps_to: fetch_no_legacy
      - case_id: F-004
        cmd: "xtgeoip fetch -b"
        valid: false
        reason: { code: no_fetch_backup }
        maps_to: fetch_no_backup
      - case_id: F-005
        cmd: "xtgeoip fetch -c"
        valid: false
        reason: { code: no_fetch_clean }
        maps_to: fetch_no_clean
      - case_id: F-006
        cmd: "xtgeoip fetch -f"
        valid: false
        reason: { code: no_fetch_force }
        maps_to: fetch_no_force

  build:
    kind: FlagCommand
    summary: Build xt_geoip database
    allowed_flags: [b, c, p, f, l]
    examples:
      - case_id: B-001
        cmd: "xtgeoip build"
        valid: true
        outcome: "build database"
      - case_id: B-002
        cmd: "xtgeoip build -l"
        valid: true
        outcome: "build (legacy mode)"
      - case_id: B-003
        cmd: "xtgeoip build -b -p"
        valid: true
        outcome: "backup then prune then build"
      - case_id: B-004
        cmd: "xtgeoip build -p"
        valid: false
        reason: { code: no_prune_backup }
        maps_to: build_prune_no_backup
      - case_id: B-005
        cmd: "xtgeoip build -c -f"
        valid: true
        outcome: "clean then build"
      - case_id: B-006
        cmd: "xtgeoip build -b -c -p"
        valid: true
        outcome: "backup, prune, clean, build"
      - case_id: B-007
        cmd: "xtgeoip build -b -c -p -f"
        valid: false
        reason: { code: no_prune_force }
        maps_to: build_prune_force
      - case_id: B-008
        cmd: "xtgeoip build -f"
        valid: false
        reason: { code: no_build_force }
        maps_to: build_force_no_target
      - case_id: B-009
        cmd: "xtgeoip build -b"
        valid: true
        outcome: "backup then build"
      - case_id: B-010
        cmd: "xtgeoip build -c"
        valid: true
        outcome: "clean then build"
      - case_id: B-011
        cmd: "xtgeoip build -b -c"
        valid: true
        outcome: "backup then clean then build"
      - case_id: B-012
        cmd: "xtgeoip build -b -f"
        valid: true
        outcome: "force backup then build"
      - case_id: B-013
        cmd: "xtgeoip build -b -c -f"
        valid: true
        outcome: "force backup then clean then build"

  run:
    kind: FlagCommand
    summary: Run full pipeline
    allowed_flags: [b, c, p, f, l]
    examples:
      - case_id: R-001
        cmd: "xtgeoip run"
        valid: true
        outcome: "fetch then build"
      - case_id: R-002
        cmd: "xtgeoip run -l"
        valid: true
        outcome: "fetch then build (legacy)"
      - case_id: R-003
        cmd: "xtgeoip run -p"
        valid: true
        outcome: "fetch then prune then build"
      - case_id: R-004
        cmd: "xtgeoip run -c -p"
        valid: true
        outcome: "clean then fetch then prune then build"
      - case_id: R-005
        cmd: "xtgeoip run -c -f"
        valid: true
        outcome: "force clean then fetch then build"
      - case_id: R-006
        cmd: "xtgeoip run -c -p -f"
        valid: false
        reason: { code: no_prune_force }
        maps_to: run_prune_force
      - case_id: R-007
        cmd: "xtgeoip run -b -c -p"
        valid: false
        reason: { code: prune_target_ambiguous }
        maps_to: run_prune_ambiguous
      - case_id: R-008
        cmd: "xtgeoip run -f"
        valid: false
        reason: { code: no_run_force }
        maps_to: run_force_no_target
      - case_id: R-009
        cmd: "xtgeoip run -b"
        valid: true
        outcome: "backup then fetch then build"
      - case_id: R-010
        cmd: "xtgeoip run -b -c"
        valid: true
        outcome: "backup then clean then fetch then build"
      - case_id: R-011
        cmd: "xtgeoip run -b -f"
        valid: true
        outcome: "force backup then fetch then build"
      - case_id: R-012
        cmd: "xtgeoip run -b -p"
        valid: true
        outcome: "backup then fetch then prune then build"
      - case_id: R-013
        cmd: "xtgeoip run -b -c -f"
        valid: true
        outcome: "force backup then clean then fetch then build"

  conf:
    kind: SelectorCommand
    summary: Manage configuration
    usage: "xtgeoip conf <-s|-d|-e>"
    positional:
      name: mode
      required: true
      choices:
        s: { summary: "Show configuration" }
        d: { summary: "Show default (example) configuration" }
        e: { summary: "Edit configuration" }
    constraints:
      exactly_one_positional: true
    examples:
      - case_id: C-001
        cmd: "xtgeoip conf"
        valid: false
        reason: { code: missing_required_argument }
        maps_to: conf_missing_flag
      - case_id: C-002
        cmd: "xtgeoip conf -s"
        valid: true
        outcome: "show configuration"
      - case_id: C-003
        cmd: "xtgeoip conf -d"
        valid: true
        outcome: "show default configuration"
      - case_id: C-004
        cmd: "xtgeoip conf -e"
        valid: true
        outcome: "edit configuration"
