version: 3.1

meta:
  program: xtgeoip
  summary: Build and manage xt_geoip data from MaxMind GeoLite2 CSVs.

proof:
  unique_maps_to: true
  full_branch_coverage: true

# ------------------------------------------------------------
# FLAGS
# ------------------------------------------------------------

flags:
  b:
    long: backup
    kind: bool
    summary: Back up current database before replacing it.
  c:
    long: clean
    kind: bool
    summary: Clean working files before continuing.
  p:
    long: prune
    kind: bool
    summary: Prune retained artifacts for the current operation.
  f:
    long: force
    kind: bool
    summary: Force the relevant operation when supported.
  l:
    long: legacy
    kind: bool
    summary: Enable legacy mode.

# ------------------------------------------------------------
# REASON TEMPLATES
# ------------------------------------------------------------

reason_templates:
  ok:
    text: "{outcome}"

  invalid_flag:
    text: "unsupported option -{flag} for {command}"

  invalid_combo:
    text: "unsupported option combination"

  no_prune_here:
    text: "{command} does not support prune"

  no_force_here:
    text: "{command} does not support force without a target"

  ambiguous_force_prune:
    text: "ambiguous flags: prune and force cannot be combined in this context"

  ambiguous_prune_target:
    text: "ambiguous prune target between {left} and {right}"

  missing_required_argument:
    text: "{command} requires {argument}"

  no_command:
    text: "no command specified"

# ------------------------------------------------------------
# ERROR CASES (ALL COVERED BELOW)
# ------------------------------------------------------------

error_cases:
  no_command:
    maps_to: no_command

  legacy_top_level:
    maps_to: legacy_top_level

  top_level_invalid_combo:
    maps_to: top_level_invalid_combo

  top_level_force_without_target:
    maps_to: top_level_force_without_target

  top_level_clean_prune:
    maps_to: top_level_clean_prune

  top_level_backup_prune_force:
    maps_to: top_level_backup_prune_force

  fetch_invalid_flags:
    maps_to: fetch_invalid_flags

  build_prune_without_backup:
    maps_to: build_prune_without_backup

  build_ambiguous_all_flags:
    maps_to: build_ambiguous_all_flags

  run_ambiguous_cpf:
    maps_to: run_ambiguous_cpf

  run_ambiguous_bcp:
    maps_to: run_ambiguous_bcp

  conf_missing_flag:
    maps_to: conf_missing_flag

# ============================================================
# TOP LEVEL
# ============================================================

top_level:
  kind: FlagCommand
  summary: Top level xtgeoip command
  allowed_flags: [b, c, p, f]

  examples:

    - case_id: TL-001
      cmd: "xtgeoip"
      valid: false
      reason: { code: no_command }
      maps_to: no_command
      exit_status: 1

    - case_id: TL-002
      cmd: "xtgeoip -h"
      valid: true
      outcome: "display usage"

    - case_id: TL-003
      cmd: "xtgeoip -l"
      valid: false
      reason: { code: invalid_flag }
      maps_to: legacy_top_level

    - case_id: TL-004
      cmd: "xtgeoip -f"
      valid: false
      reason: { code: no_force_here }
      maps_to: top_level_force_without_target

    - case_id: TL-005
      cmd: "xtgeoip -p"
      valid: false
      reason: { code: invalid_combo }
      maps_to: top_level_invalid_combo

    - case_id: TL-006
      cmd: "xtgeoip -b"
      valid: true
      outcome: "backup database"

    - case_id: TL-007
      cmd: "xtgeoip -c"
      valid: true
      outcome: "clean database"

    - case_id: TL-008
      cmd: "xtgeoip -b -c"
      valid: true
      outcome: "backup then clean"

    - case_id: TL-009
      cmd: "xtgeoip -b -p"
      valid: true
      outcome: "backup then prune"

    - case_id: TL-010
      cmd: "xtgeoip -c -p"
      valid: false
      reason: { code: no_prune_here }
      maps_to: top_level_clean_prune

    - case_id: TL-011
      cmd: "xtgeoip -b -p -f"
      valid: false
      reason: { code: ambiguous_force_prune }
      maps_to: top_level_backup_prune_force

    - case_id: TL-012
      cmd: "xtgeoip -c -p -f"
      valid: false
      reason: { code: invalid_combo }
      maps_to: top_level_invalid_combo

# ============================================================
# FETCH
# ============================================================

fetch:
  kind: FlagCommand
  summary: Fetch GeoLite2 data files
  allowed_flags: [p]

  examples:

    - case_id: F-001
      cmd: "xtgeoip fetch"
      valid: true
      outcome: "fetch CSVs"

    - case_id: F-002
      cmd: "xtgeoip fetch -p"
      valid: true
      outcome: "fetch then prune archives"

    - case_id: F-003
      cmd: "xtgeoip fetch -l"
      valid: false
      reason: { code: invalid_flag }
      maps_to: fetch_invalid_flags

    - case_id: F-004
      cmd: "xtgeoip fetch -b"
      valid: false
      reason: { code: invalid_flag }
      maps_to: fetch_invalid_flags

    - case_id: F-005
      cmd: "xtgeoip fetch -c"
      valid: false
      reason: { code: invalid_flag }
      maps_to: fetch_invalid_flags

    - case_id: F-006
      cmd: "xtgeoip fetch -f"
      valid: false
      reason: { code: invalid_flag }
      maps_to: fetch_invalid_flags

# ============================================================
# BUILD
# ============================================================

build:
  kind: FlagCommand
  summary: Build xt_geoip database
  allowed_flags: [b, c, p, f, l]

  examples:

    - case_id: B-001
      cmd: "xtgeoip build"
      valid: true
      outcome: "build database"

    - case_id: B-002
      cmd: "xtgeoip build -l"
      valid: true
      outcome: "build (legacy mode)"

    - case_id: B-003
      cmd: "xtgeoip build -b -p"
      valid: true
      outcome: "backup then prune then build"

    - case_id: B-004
      cmd: "xtgeoip build -p"
      valid: false
      reason: { code: no_prune_here }
      maps_to: build_prune_without_backup

    - case_id: B-005
      cmd: "xtgeoip build -c -f"
      valid: true
      outcome: "clean then build"

    - case_id: B-006
      cmd: "xtgeoip build -b -c -p"
      valid: true
      outcome: "backup, prune, clean, build"

    - case_id: B-007
      cmd: "xtgeoip build -b -c -p -f"
      valid: false
      reason: { code: ambiguous_force_prune }
      maps_to: build_ambiguous_all_flags

# ============================================================
# RUN
# ============================================================

run:
  kind: FlagCommand
  summary: Run full pipeline
  allowed_flags: [b, c, p, f, l]

  examples:

    - case_id: R-001
      cmd: "xtgeoip run"
      valid: true
      outcome: "fetch then build"

    - case_id: R-002
      cmd: "xtgeoip run -l"
      valid: true
      outcome: "fetch then build (legacy)"

    - case_id: R-003
      cmd: "xtgeoip run -p"
      valid: true
      outcome: "fetch then prune then build"

    - case_id: R-004
      cmd: "xtgeoip run -c -p"
      valid: true
      outcome: "clean then fetch then prune then build"

    - case_id: R-005
      cmd: "xtgeoip run -c -f"
      valid: true
      outcome: "force clean then fetch then build"

    - case_id: R-006
      cmd: "xtgeoip run -c -p -f"
      valid: false
      reason: { code: ambiguous_force_prune }
      maps_to: run_ambiguous_cpf

    - case_id: R-007
      cmd: "xtgeoip run -b -c -p"
      valid: false
      reason: { code: ambiguous_prune_target }
      maps_to: run_ambiguous_bcp

# ============================================================
# CONF
# ============================================================

conf:
  kind: SelectorCommand
  summary: Manage configuration
  usage: "xtgeoip conf <-s|-d|-e>"

  positional:
    name: mode
    required: true
    choices:
      s: { summary: "Show configuration" }
      d: { summary: "Delete configuration" }
      e: { summary: "Edit configuration" }

  constraints:
    exactly_one_positional: true

  examples:

    - case_id: C-001
      cmd: "xtgeoip conf"
      valid: false
      reason: { code: missing_required_argument }
      maps_to: conf_missing_flag

    - case_id: C-002
      cmd: "xtgeoip conf -s"
      valid: true
      outcome: "show configuration"

    - case_id: C-003
      cmd: "xtgeoip conf -d"
      valid: true
      outcome: "show default configuration"

    - case_id: C-004
      cmd: "xtgeoip conf -e"
      valid: true
      outcome: "edit configuration"
